specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AITUVoting
    network: sepolia
    source:
      address: "0x333CCc861677b1B72cc561B0b7fC1b468b344CaB"
      abi: AITUVoting
      startBlock: 10226351
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Approval
        - ElectionCreated
        - ElectionStopped
        - OwnershipTransferred
        - Transfer
        - Voted
      abis:
        - name: AITUVoting
          file: ./abis/AITUVoting.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
        - event: ElectionCreated(indexed uint256,string,address)
          handler: handleElectionCreated
        - event: ElectionStopped(indexed uint256)
          handler: handleElectionStopped
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Voted(indexed uint256,indexed uint256,bytes32)
          handler: handleVoted
      file: ./src/aitu-voting.ts
